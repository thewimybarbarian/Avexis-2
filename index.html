<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AVEXIS — Intelligence · Engineered</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="components/styles.css" />
<link rel="stylesheet" href="components/footer.css" />

<style>
  body[data-display="space"] { --display: 'Space Grotesk', sans-serif; }
  body[data-display="syne"] { --display: 'Syne', sans-serif; }
</style>

<script>
  window.TWEAKS = /*EDITMODE-BEGIN*/{
    "accent": "#00D4FF",
    "heroVariant": "engineered",
    "displayFont": "orbitron"
  }/*EDITMODE-END*/;
</script>
</head>
<body data-display="orbitron">

<div class="av-grain"></div>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/primitives.jsx"></script>
<script type="text/babel" src="components/advanced.jsx"></script>
<script type="text/babel" src="components/hero.jsx"></script>
<script type="text/babel" src="components/services.jsx"></script>
<script type="text/babel" src="components/rest.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [introDone, setIntroDone] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [state, setState] = useState(window.TWEAKS);

  // Apply accent + font to document
  useEffect(() => {
    document.documentElement.style.setProperty('--cyan', state.accent);
    // derive a lighter tint
    const lighten = (hex, amt) => {
      const n = parseInt(hex.slice(1), 16);
      let r = (n >> 16) + amt, g = (n >> 8 & 0xff) + amt, b = (n & 0xff) + amt;
      r = Math.min(255, r); g = Math.min(255, g); b = Math.min(255, b);
      return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6, '0');
    };
    document.documentElement.style.setProperty('--cyan-light', lighten(state.accent, 40));
    document.body.dataset.display = state.displayFont;
    // update shiny gradient
    const style = document.getElementById('__accent-style') || document.createElement('style');
    style.id = '__accent-style';
    style.textContent = `
      .av-shiny { background-image: linear-gradient(100deg, ${state.accent} 0%, ${state.accent} 40%, #ffffff 50%, ${state.accent} 60%, ${state.accent} 100%) !important; filter: drop-shadow(0 0 24px ${state.accent}80); }
      .av-hero__title .glow { text-shadow: 0 0 40px ${state.accent}59, 0 0 80px ${state.accent}26; }
    `;
    if (!style.parentNode) document.head.appendChild(style);
    // persist
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: state }, '*');
  }, [state]);

  // Tweaks protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  return (
    <>
      <MagneticCursor />
      <ScrollProgress />
      {!introDone && <Intro onComplete={() => setIntroDone(true)} />}
      <div style={{ opacity: introDone ? 1 : 0, transition: 'opacity .7s ease' }}>
        <Nav />
        <Hero variant={state.heroVariant} accent={state.accent} />
        <Marquee />
        <Services />
        <About />
        <Work />
        <Agents />
        <Estimator />
        <FAQ />
        <Contact />
        <Footer />
      </div>
      <TweaksPanel open={tweaksOpen} state={state} setState={setState} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
